<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
    <div id="loading-screen" style="padding:50px; text-align:center; font-family:sans-serif; color:#666;">
        Checking for updates and syncing fleet data...
    </div>
    
    <script>
    geotab.addin['fleet-health-auto'] = function() {
        return {
            initialize: function(api, state, callback) {
                // 1. Generate a unique timestamp to bypass ALL caching
                var cacheBuster = new Date().getTime();
                var scriptUrl = 'https://YOUR_USERNAME.github.io/YOUR_REPO/fleet-health-logic.js?t=' + cacheBuster;
                
                // 2. Dynamically load the latest script from GitHub
                var script = document.createElement('script');
                script.src = scriptUrl;
                script.onload = function() {
                    // 3. Hide loading screen and run the logic
                    document.getElementById('loading-screen').style.display = 'none';
                    if (window.initFleetHealth) {
                        window.initFleetHealth(api, state, callback);
                    }
                };
                document.head.appendChild(script);
            }
        };
    };
    </script>
</body>
</html>
